name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # krpc is needed only so module imports resolve; no KSP instance runs in CI.
      - run: pip install numpy pandas scikit-learn krpc pytest
      - run: pytest tests/ -v
